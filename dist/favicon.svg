<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0A8276"/>
  
  <!-- Globe grid lines -->
  <!-- Equator -->
  <ellipse cx="16" cy="16" rx="15" ry="15" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.8"/>
  <!-- Horizontal lines -->
  <ellipse cx="16" cy="10" rx="12" ry="3.5" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.8"/>
  <ellipse cx="16" cy="22" rx="12" ry="3.5" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.8"/>
  <!-- Vertical center line -->
  <ellipse cx="16" cy="16" rx="0.01" ry="15" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.8"/>
  <!-- Vertical left line -->
  <ellipse cx="16" cy="16" rx="8" ry="15" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="0.8"/>
  <!-- Vertical right line (same as left, mirrored) -->
  <!-- Horizontal equator line -->
  <line x1="1" y1="16" x2="31" y2="16" stroke="rgba(255,255,255,0.35)" stroke-width="0.8"/>

  <!-- Outer circle border -->
  <circle cx="16" cy="16" r="15" fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.2"/>
  
  <!-- Shine highlight -->
  <ellipse cx="11" cy="10" rx="4" ry="2.5" fill="rgba(255,255,255,0.18)" transform="rotate(-20,11,10)"/>
</svg>